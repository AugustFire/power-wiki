<h2>JavaScript · 防抖</h2>
<p>输入框搜索、表单提交、滚动事件 — 任何"高频但不需要每次都执行"的场景。</p>
<pre><code class="language-javascript">/**
 * 防抖 — 多次触发合并成一次,只在最后一次触发后 wait ms 才执行
 * 区别于节流(throttle):节流保证"每 wait ms 至少执行一次",防抖保证"停下来 wait ms 才执行"
 */
export function debounce(fn, wait = 200) {
  let timer = null
  return function debounced(...args) {
    if (timer) clearTimeout(timer)
    timer = setTimeout(() => {
      timer = null
      fn.apply(this, args)
    }, wait)
  }
}

<h2>CSS · 居中</h2>
<p>三种居中方式各有适用场景,别再写 <code>margin: 0 auto</code> 居中 vertical 了。</p>
<pre><code class="language-css">/* 1. flex — 推荐,99% 的情况用它 */
.flex-center {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 2. position + transform — 居中元素宽高未知 */
.abs-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* 3. grid — 当布局本身就是 grid,顺手用 place-items */
.grid-center {
  display: grid;
  place-items: center;
}</code></pre>
<h2>Python · 异步任务批处理</h2>
<p>批量调外部 API 时,串行太慢,直接 asyncio.gather 又可能把上游打爆 — 用信号量控制并发。</p>
<pre><code class="language-python">import asyncio
import aiohttp

async def fetch_all(urls: list[str], max_concurrent: int = 10) -&gt; list[dict]:
    &quot;&quot;&quot;并发拉取,但并发度受信号量限制。&quot;&quot;&quot;
    sem = asyncio.Semaphore(max_concurrent)
    results = []

    async def fetch_one(session: aiohttp.ClientSession, url: str) -&gt; dict:
        async with sem:  # 超过 max_concurrent 时,后面的 await 排队
            try:
                async with session.get(url, timeout=10) as resp:
                    return await resp.json()
            except Exception as e:
                return {&quot;url&quot;: url, &quot;error&quot;: str(e)}

    async with aiohttp.ClientSession() as session:
        tasks = [fetch_one(session, url) for url in urls]
        results = await asyncio.gather(*tasks)
    return results

# 用法:
# urls = [&quot;https://api.example.com/items/1&quot;, ...]
# data = asyncio.run(fetch_all(urls, max_concurrent=20))</code></pre>
<h2>SQL · 窗口函数</h2>
<p>查"每个组里排名前 N"用 <code>ROW_NUMBER() OVER</code> 比 <code>GROUP BY + JOIN</code> 干净一个数量级。</p>
<pre><code class="language-sql">-- 查每个部门工资最高的前 3 名员工
SELECT dept, name, salary, rank
FROM (
  SELECT
    dept,
    name,
    salary,
    ROW_NUMBER() OVER (PARTITION BY dept ORDER BY salary DESC) AS rank
  FROM employees
) ranked
WHERE rank &lt;= 3
ORDER BY dept, rank;</code></pre>
<p>对比用 <code>GROUP BY + JOIN + 子查询</code> 的写法,大概 6 行变 12 行,而且性能差 (窗口函数走一次全表,JOIN 方案需要先聚合再回连)。</p>
